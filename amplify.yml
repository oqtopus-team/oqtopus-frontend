version: 1

frontend:
  phases:
    preBuild:
      commands:
        # install bun
        - curl -fsSL https://bun.sh/install | bash
        - source /root/.bash_profile
        - bun install
        # - bun generate -- --src "github:oqtopus-team/oqtopus-cloud" --ref develop --path "/backend/oas/user/openapi.yaml"
        # download favicon
        - if [ -n "$FAVICON_SRC_S3" ]; then
            aws s3 cp "s3://$OQTOPUS_FRONTEND_BUILD_BUCKET/$FAVICON_SRC_S3" ./public/favicon.svg;
          fi 
    build:
      commands:
        - bun run build
  artifacts:
    baseDirectory: dist/
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
