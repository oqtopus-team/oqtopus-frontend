name: PR Auto Label

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-label:
    runs-on: ubuntu-latest

    steps:
      - name: Add labels based on Conventional Commits
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || "";
            const body = pr.body || "";

            const lowerTitle = title.toLowerCase();
            const labelsToAdd = [];

            // ----------------------------
            // Release PR detection
            // ----------------------------
            // Matches: "Release v1.2.3"
            if (/^Release v\d+\.\d+\.\d+/i.test(title)) {
              labels.add("release");
            }

            // Detect Conventional Commit type from PR title
            if (/^feat(\(.+\))?:/.test(lowerTitle)) {
              labelsToAdd.push("feature");
            } else if (/^fix(\(.+\))?:/.test(lowerTitle)) {
              labelsToAdd.push("fix");
            } else if (/^chore(\(.+\))?:/.test(lowerTitle)) {
              labelsToAdd.push("chore");
            }

            // Detect breaking change
            if (/!:/ .test(title) || /breaking change/i.test(body)) {
              labelsToAdd.push("breaking changes");
            }

            if (labelsToAdd.length === 0) {
              console.log("No labels to add.");
              return;
            }

            console.log("Adding labels:", labelsToAdd);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: labelsToAdd
            });